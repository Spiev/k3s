# =============================================================================
# Restic Backup Dashboard für Home Assistant — k3s
# =============================================================================
# Jeder Service hat seinen eigenen MQTT-Sensor (via MQTT Discovery automatisch
# angelegt — kein manueller Eintrag in mqtt.yaml nötig):
#
#   sensor.backup_overall    — Gesamtstatus, Repo-Größe, Laufzeit
#   sensor.backup_paperless  — Status + Datei-Statistiken Paperless
#   sensor.backup_teslamate  — Status + Datei-Statistiken Teslamate
#
# Sensoren erscheinen erst nach dem ersten Backup-Lauf in HA.
#
# Dashboard hinzufügen:
#   Einstellungen → Dashboards → Dashboard hinzufügen → neues Dashboard
#   Rechts oben: 3 Punkte → Raw-Konfigurationseditor → Inhalt ab "views:" einfügen
#
# Oder als View in bestehendes Dashboard:
#   Dashboard öffnen → Bearbeiten → View hinzufügen → Raw-Konfigurationseditor
#   Inhalt ab "title: Backup" einfügen
# =============================================================================

views:
  - title: Backup
    path: backup
    icon: mdi:backup-restore
    cards:

      # -----------------------------------------------------------------
      # Zeile 1: Gesamtstatus
      # -----------------------------------------------------------------
      - type: vertical-stack
        cards:
          - type: entity
            entity: sensor.backup_overall
            name: Backup Gesamt
            icon: mdi:backup-restore
            state_color: true

          - type: markdown
            title: Letzter Lauf
            content: |
              | | |
              |---|---|
              | **Letzter Lauf** | {{ state_attr('sensor.backup_overall', 'last_run') | as_datetime | relative_time }} |
              | **Letzter Erfolg** | {{ state_attr('sensor.backup_overall', 'last_success_time') | as_datetime | relative_time }} |
              | **Dauer** | {{ state_attr('sensor.backup_overall', 'duration_seconds') }}s |

      # -----------------------------------------------------------------
      # Zeile 2: Repository-Statistiken (S3)
      # -----------------------------------------------------------------
      - type: markdown
        title: Repository (Hetzner S3)
        content: |
          | | |
          |---|---|
          | **Größe** | {{ state_attr('sensor.backup_overall', 'repository_size_gb') }} GB |
          | **Snapshots** | {{ state_attr('sensor.backup_overall', 'snapshot_count') }} |
          | **Gesicherte Services** | {{ state_attr('sensor.backup_overall', 'services') }} |

      # -----------------------------------------------------------------
      # Zeile 3: Status pro Service
      # -----------------------------------------------------------------
      - type: entities
        title: Status pro Service
        entities:
          - entity: sensor.backup_paperless
            name: Paperless-ngx
            icon: mdi:file-document
          - entity: sensor.backup_teslamate
            name: Teslamate
            icon: mdi:car-electric

      # -----------------------------------------------------------------
      # Zeile 4: Details pro Service
      # -----------------------------------------------------------------
      - type: markdown
        title: Details pro Service
        content: |
          | Service | Neue Dateien | Geändert | Letzter Lauf |
          |---------|-------------|----------|--------------|
          | Paperless | {{ state_attr('sensor.backup_paperless', 'files_new') }} | {{ state_attr('sensor.backup_paperless', 'files_changed') }} | {{ state_attr('sensor.backup_paperless', 'last_run') | as_datetime | relative_time }} |
          | Teslamate | {{ state_attr('sensor.backup_teslamate', 'files_new') }} | {{ state_attr('sensor.backup_teslamate', 'files_changed') }} | {{ state_attr('sensor.backup_teslamate', 'last_run') | as_datetime | relative_time }} |

      # -----------------------------------------------------------------
      # Zeile 5: Verlauf / Logbuch (alle Sensoren)
      # -----------------------------------------------------------------
      - type: logbook
        title: Backup-Verlauf
        entities:
          - sensor.backup_overall
          - sensor.backup_paperless
          - sensor.backup_teslamate
        hours_to_show: 168  # 7 Tage
