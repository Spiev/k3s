title: Backup k3s
path: backup-k3s
icon: mdi:kubernetes
type: masonry
cards:
  - type: vertical-stack
    cards:
      - type: entity
        entity: sensor.backup_overall
        name: Backup k3s — Gesamt
        icon: mdi:backup-restore
        state_color: true
      - type: markdown
        title: Letzter Lauf
        content: >
          | | |

          |---|---|

          | **Zeitpunkt** | {% set t = state_attr('sensor.backup_overall',
          'last_run') %}{{ t | as_datetime | relative_time if t else '—' }} |

          | **Dauer** | {{ state_attr('sensor.backup_overall',
          'duration_seconds') | default('—') }}s |

          | **Aktive Services** | {{ state_attr('sensor.backup_overall',
          'active_services') | default('—') }} |

      - type: markdown
        title: Repository (Hetzner S3)
        content: >
          | | |

          |---|---|

          | **Größe** | {{ state_attr('sensor.backup_overall',
          'repository_size_gb') | default('—') }} GB |

          | **Snapshots** | {{ state_attr('sensor.backup_overall',
          'snapshot_count') | default('—') }} |

          | **Neue Dateien** | {{ state_attr('sensor.backup_overall',
          'files_new') | default('—') }} |

          | **Geänderte Dateien** | {{ state_attr('sensor.backup_overall',
          'files_changed') | default('—') }} |

  - type: vertical-stack
    title: Services
    cards:
      - type: entity
        entity: sensor.backup_teslamate
        name: Teslamate
        icon: mdi:car-electric
        state_color: true
      - type: markdown
        content: >
          | | |

          |---|---|

          | **Letzter Lauf** | {% set t = state_attr('sensor.backup_teslamate',
          'last_run') %}{{ t | as_datetime | relative_time if t else '—' }} |

          | **Neue Dateien** | {{ state_attr('sensor.backup_teslamate',
          'files_new') | default('—') }} |

          | **Geänderte Dateien** | {{ state_attr('sensor.backup_teslamate',
          'files_changed') | default('—') }} |

  - type: logbook
    title: Backup-Verlauf
    entities:
      - sensor.backup_overall
      - sensor.backup_teslamate
    hours_to_show: 168
