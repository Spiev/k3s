---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  provider: github
  ref:
    branch: main
  secretRef:
    name: github-app-auth
  url: https://github.com/Spiev/k3s
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/raspi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
