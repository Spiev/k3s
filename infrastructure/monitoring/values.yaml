# Helm values for kube-prometheus-stack
#
# Install:
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --values infrastructure/monitoring/values.yaml
#
# Upgrade:
#   helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring \
#     --values infrastructure/monitoring/values.yaml

grafana:
  adminPassword: ""    # <-- set on first install via --set grafana.adminPassword=<password>

  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi

prometheus:
  prometheusSpec:
    # Retain metrics for 30 days (default: 10d)
    retention: 30d

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
