# Helm Values für kube-prometheus-stack
#
# Anwenden mit:
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --values infrastructure/monitoring/values.yaml
#
# Update:
#   helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring \
#     --values infrastructure/monitoring/values.yaml

grafana:
  adminPassword: ""    # <-- beim ersten Install via --set grafana.adminPassword=<passwort> setzen

  persistence:
    enabled: true
    storageClassName: longhorn-retain
    size: 2Gi

prometheus:
  prometheusSpec:
    # Metriken 30 Tage aufbewahren (Standard: 10d)
    retention: 30d

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-retain
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn-retain
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
