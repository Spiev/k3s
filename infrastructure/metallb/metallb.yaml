# MetalLB configuration — Layer 2 mode, Dual-Stack
#
# Prerequisite: MetalLB controller is installed (see docs/02b-metallb.md)
# and k3s ServiceLB (Klipper) is disabled.
#
# ADJUST: Set addresses to match your home network.
# The pool range must be outside the DHCP range of your router (Fritz!Box).

---
# IPAddressPool — the IP pool for LoadBalancer services
#
# MetalLB assigns IPs from this pool as EXTERNAL-IP when a service of
# type: LoadBalancer requests one. The range must be outside the DHCP
# range of the Fritz!Box.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: metallb-system
  labels:
    app: metallb
spec:
  addresses:
    - <METALLB-IPV4-START>-<METALLB-IPV4-END>   # IPv4: outside DHCP range
    - <ULA-PREFIX>::<RANGE-START>-<ULA-PREFIX>::<RANGE-END>  # IPv6: symmetric to IPv4 range
---
# L2Advertisement — enables Layer-2 mode (ARP for IPv4, NDP for IPv6)
#
# MetalLB runs as a DaemonSet on every node and responds to ARP/NDP requests
# for the assigned VIPs. From the local network's perspective, the VIP appears
# to be directly on the node.
#
# On failover (node failure or restart), the other node takes over the
# ARP/NDP announcement — the VIP migrates automatically.
#
# Known limitation: does not work over Wi-Fi (Fritz!Box blocks
# Gratuitous ARP for IPs outside DHCP). Ethernet required.
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2
  namespace: metallb-system
  labels:
    app: metallb
spec:
  ipAddressPools:
    - homelab-pool    # reference to the pool above
