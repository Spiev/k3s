# MetalLB Konfiguration — Layer 2 Modus, Dual-Stack
#
# Voraussetzung: MetalLB Controller ist installiert (siehe docs/02b-metallb.md)
# und k3s ServiceLB (Klipper) ist deaktiviert.
#
# ANPASSEN: Adressen an das eigene Heimnetz anpassen.
# Der Pool-Bereich muss außerhalb des DHCP-Bereichs der Fritz!Box liegen.

---
# IPAddressPool — der IP-Vorrat für LoadBalancer-Services
#
# MetalLB weist IPs aus diesem Pool als EXTERNAL-IP zu wenn ein Service
# type: LoadBalancer anfragt. Der Bereich muss außerhalb des DHCP-Bereichs
# der Fritz!Box liegen.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: metallb-system
  labels:
    app: metallb
spec:
  addresses:
    - <METALLB-IPV4-START>-<METALLB-IPV4-END>   # IPv4: freier Bereich außerhalb DHCP
    - <ULA-PREFIX>::<RANGE-START>-<ULA-PREFIX>::<RANGE-END>  # IPv6: aus dem ULA-Prefix der Fritz!Box
---
# L2Advertisement — aktiviert Layer-2-Modus (ARP für IPv4, NDP für IPv6)
#
# MetalLB läuft als DaemonSet auf jedem Node und antwortet auf ARP/NDP-Anfragen
# für die zugewiesenen VIPs. Für das lokale Netz sieht die VIP aus als würde
# sie direkt auf dem Node liegen.
#
# Beim Failover (Node-Ausfall oder Neustart) übernimmt der andere Node die
# ARP/NDP-Ankündigung — die VIP wandert automatisch mit.
#
# Bekannte Einschränkung: funktioniert nicht über WLAN (Fritz!Box blockiert
# Gratuitous ARP für IPs außerhalb DHCP). Ethernet erforderlich.
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2
  namespace: metallb-system
  labels:
    app: metallb
spec:
  ipAddressPools:
    - homelab-pool    # Referenz auf den Pool oben
