apiVersion: v1
kind: Namespace
metadata:
  name: teslamate
  labels:
    app: teslamate
    type: service
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teslamate-db
  namespace: teslamate
  labels:
    app: teslamate-db
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teslamate-grafana
  namespace: teslamate
  labels:
    app: teslamate-grafana
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teslamate-import
  namespace: teslamate
  labels:
    app: teslamate
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate-db
  namespace: teslamate
  labels:
    app: teslamate-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: teslamate-db
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
          env:
            - name: POSTGRES_USER
              value: teslamate
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: DATABASE_PASS
            - name: POSTGRES_DB
              value: teslamate
            - name: PGDATA
              value: /var/lib/postgresql/data
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, teslamate]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: teslamate-db
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate-db
  namespace: teslamate
  labels:
    app: teslamate-db
spec:
  selector:
    app: teslamate-db
  ports:
    - port: 5432
      targetPort: 5432
---
# NodePort für Home Assistant SQL-Integration (sensor.tesla_charging_cost_monthly/total).
# HA läuft auf dem Pi (Docker, nicht k3s) und kann ClusterIP-Services nicht erreichen —
# daher wird Port 5432 als NodePort 30432 im lokalen Netz exponiert.
apiVersion: v1
kind: Service
metadata:
  name: teslamate-db-nodeport
  namespace: teslamate
  labels:
    app: teslamate-db
spec:
  type: NodePort
  selector:
    app: teslamate-db
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate
  namespace: teslamate
  labels:
    app: teslamate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: teslamate
    spec:
      initContainers:
        - name: wait-for-db
          image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
          command: ['sh', '-c', 'until nc -z teslamate-db 5432; do echo "waiting for postgres..."; sleep 2; done']
      containers:
        - name: teslamate
          image: teslamate/teslamate:3.0.0@sha256:6569026b73bd657455bbec05965d07fa30b6d4d70eaab0bd5b343231c0429167
          env:
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: ENCRYPTION_KEY
            - name: DATABASE_USER
              value: teslamate
            - name: DATABASE_PASS
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: DATABASE_PASS
            - name: DATABASE_NAME
              value: teslamate
            - name: DATABASE_HOST
              value: teslamate-db
            - name: MQTT_HOST
              value: "${MQTT_HOST}"
            - name: MQTT_USERNAME
              value: teslamate
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: MQTT_PASSWORD
            - name: TZ
              value: Europe/Berlin
          ports:
            - containerPort: 4000
          volumeMounts:
            - name: import
              mountPath: /opt/app/import
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 6
      volumes:
        - name: import
          persistentVolumeClaim:
            claimName: teslamate-import
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate
  namespace: teslamate
  labels:
    app: teslamate
spec:
  selector:
    app: teslamate
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate-grafana
  namespace: teslamate
  labels:
    app: teslamate-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate-grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: teslamate-grafana
    spec:
      initContainers:
        - name: wait-for-db
          image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
          command: ['sh', '-c', 'until nc -z teslamate-db 5432; do echo "waiting for postgres..."; sleep 2; done']
      containers:
        - name: grafana
          image: teslamate/grafana:3.0.0@sha256:e02d1f036dd10771ea04db2bafc483067a9dbb874d0b5137dda5a6fe539b77dc
          env:
            - name: DATABASE_HOST
              value: teslamate-db
            - name: DATABASE_USER
              value: teslamate
            - name: DATABASE_PASS
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: DATABASE_PASS
            - name: DATABASE_NAME
              value: teslamate
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_SSL_MODE
              value: disable
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: GRAFANA_ROOT_URL
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: teslamate-grafana
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate-grafana
  namespace: teslamate
  labels:
    app: teslamate-grafana
spec:
  selector:
    app: teslamate-grafana
  ports:
    - port: 3000
      targetPort: 3000
