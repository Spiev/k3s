apiVersion: v1
kind: Namespace
metadata:
  name: teslamate
  labels:
    app: teslamate
    type: service
---
# =============================================================================
# teslamate-db — PostgreSQL 18 (stores all vehicle/drive data)
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teslamate-db
  namespace: teslamate
  labels:
    app: teslamate-db
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate-db
  namespace: teslamate
  labels:
    app: teslamate-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: teslamate-db
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
          env:
            - name: POSTGRES_USER
              value: teslamate
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: DATABASE_PASS
            - name: POSTGRES_DB
              value: teslamate
            - name: PGDATA
              value: /var/lib/postgresql/data
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, teslamate]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: teslamate-db
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate-db
  namespace: teslamate
  labels:
    app: teslamate-db
spec:
  selector:
    app: teslamate-db
  ports:
    - port: 5432
      targetPort: 5432
---
# NodePort für Home Assistant SQL-Integration (sensor.tesla_charging_cost_monthly/total).
# HA läuft auf dem Pi (Docker, nicht k3s) und kann ClusterIP-Services nicht erreichen —
# daher wird Port 5432 als NodePort 30432 im lokalen Netz exponiert.
apiVersion: v1
kind: Service
metadata:
  name: teslamate-db-nodeport
  namespace: teslamate
  labels:
    app: teslamate-db
spec:
  type: NodePort
  selector:
    app: teslamate-db
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
---
# =============================================================================
# teslamate — main application (Elixir), talks to Tesla API + MQTT, web UI :4000
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate
  namespace: teslamate
  labels:
    app: teslamate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: teslamate
    spec:
      initContainers:
        - name: wait-for-db
          image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
          command: ['sh', '-c', 'until nc -z teslamate-db 5432; do echo "waiting for postgres..."; sleep 2; done']
      containers:
        - name: teslamate
          image: teslamate/teslamate:4.0.1@sha256:e77ec65007aafb40d736ed2c89675112fe8d960886ea9d7de3255f2b5360269f
          env:
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: ENCRYPTION_KEY
            - name: DATABASE_USER
              value: teslamate
            - name: DATABASE_PASS
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: DATABASE_PASS
            - name: DATABASE_NAME
              value: teslamate
            - name: DATABASE_HOST
              value: teslamate-db
            - name: MQTT_HOST
              value: "${MQTT_HOST}"
            - name: MQTT_USERNAME
              value: teslamate
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: MQTT_PASSWORD
            - name: TZ
              value: Europe/Berlin
            # TEST: rolled back to the legacy Owner API to escape the Fleet API
            # pay-per-use limit. The Owner API was never removed from TeslaMate —
            # the 2026-06-12 outage was Tesla rejecting tokens minted over old TLS;
            # the TLS-1.3 fix (PR #5406, baked into v4.0.1) keeps the built-in
            # `ownerapi` token valid. The Owner API needs no client_id/secret, so
            # leaving TESLA_API_HOST/TESLA_AUTH_CLIENT_ID unset falls back to the
            # Owner API host + the `ownerapi` client. Auth is via account tokens
            # entered in the UI (stored encrypted in the DB via ENCRYPTION_KEY).
            # To revert to Fleet API: re-add
            #   TESLA_API_HOST=https://fleet-api.prd.eu.vn.cloud.tesla.com
            #   TESLA_AUTH_CLIENT_ID (from teslamate-secrets, key still present)
            # and re-auth.
            - name: TESLA_AUTH_HOST
              value: https://auth.tesla.com
            - name: TESLA_AUTH_PATH
              value: /oauth2/v3
          ports:
            - containerPort: 4000
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate
  namespace: teslamate
  labels:
    app: teslamate
spec:
  selector:
    app: teslamate
  ports:
    - port: 4000
      targetPort: 4000
---
# =============================================================================
# teslamate-grafana — Grafana with the bundled TeslaMate dashboards, web UI :3000
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teslamate-grafana
  namespace: teslamate
  labels:
    app: teslamate-grafana
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate-grafana
  namespace: teslamate
  labels:
    app: teslamate-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate-grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: teslamate-grafana
    spec:
      initContainers:
        - name: wait-for-db
          image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
          command: ['sh', '-c', 'until nc -z teslamate-db 5432; do echo "waiting for postgres..."; sleep 2; done']
      containers:
        - name: grafana
          image: teslamate/grafana:4.0.1@sha256:f2afcd9bdc849e65ef53c765be8590a0f0f8416709f501aa179760ea97035cf8
          env:
            - name: DATABASE_HOST
              value: teslamate-db
            - name: DATABASE_USER
              value: teslamate
            - name: DATABASE_PASS
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: DATABASE_PASS
            - name: DATABASE_NAME
              value: teslamate
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_SSL_MODE
              value: disable
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              valueFrom:
                secretKeyRef:
                  name: teslamate-secrets
                  key: GRAFANA_ROOT_URL
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: teslamate-grafana
---
apiVersion: v1
kind: Service
metadata:
  name: teslamate-grafana
  namespace: teslamate
  labels:
    app: teslamate-grafana
spec:
  selector:
    app: teslamate-grafana
  ports:
    - port: 3000
      targetPort: 3000
