apiVersion: v1
kind: Namespace
metadata:
  name: freshrss
  labels:
    app: freshrss
    type: service
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: freshrss-config-new
  namespace: freshrss
  labels:
    app: freshrss
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app: freshrss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshrss
  strategy:
    type: Recreate      # Recreate statt RollingUpdate: PVC ist RWO, darf nur von einem Pod gleichzeitig gemountet werden
  template:
    metadata:
      labels:
        app: freshrss
    spec:
      containers:
        - name: freshrss
          image: lscr.io/linuxserver/freshrss:1.29.1-ls308@sha256:dba370a489b60d76c8d21b7a0d6eb8f39bcd47f71e891839e9b572e638a126f3
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Berlin"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: freshrss-config-new
---
apiVersion: v1
kind: Service
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app: freshrss
spec:
  selector:
    app: freshrss
  ports:
    - port: 80
      targetPort: 80
