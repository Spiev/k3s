apiVersion: v1
kind: Namespace
metadata:
  name: freshrss
  labels:
    app: freshrss
    type: service
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: freshrss-config-enc
  namespace: freshrss
  labels:
    app: freshrss
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-retain-encrypted
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app: freshrss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshrss
  strategy:
    type: Recreate      # Recreate statt RollingUpdate: PVC ist RWO, darf nur von einem Pod gleichzeitig gemountet werden
  template:
    metadata:
      labels:
        app: freshrss
    spec:
      containers:
        - name: freshrss
          image: lscr.io/linuxserver/freshrss:1.28.1-ls300@sha256:ab938915c70899ea78c018fef85fa8a0bef04bdd0337559d9f1a51c1d8ad66e3
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Berlin"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: freshrss-config-enc
---
apiVersion: v1
kind: Service
metadata:
  name: freshrss
  namespace: freshrss
  labels:
    app: freshrss
spec:
  selector:
    app: freshrss
  ports:
    - port: 80
      targetPort: 80
