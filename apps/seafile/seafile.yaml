apiVersion: v1
kind: Namespace
metadata:
  name: seafile
  labels:
    app: seafile
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-data
  namespace: seafile
  labels:
    app: mariadb
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-retain-encrypted
  resources:
    requests:
      storage: 10Gi    # Metadaten-DB: kleiner als Blob-Storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seafile-data
  namespace: seafile
  labels:
    app: seafile
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-retain-encrypted
  resources:
    requests:
      storage: 50Gi    # Datei-Blobs: großzügig bemessen
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: seafile
  labels:
    app: mariadb
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:12.2@sha256:e16f61b8f6ed25111adbb1c5c19bbc2904efc8ed14029999af0cbe1c7ae18bf1
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: seafile_db
            - name: MYSQL_USER
              value: seafile
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: seafile
  labels:
    app: mariadb
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
  # ClusterIP (default): nur intern erreichbar
  # Seafile spricht MariaDB an via: mariadb.seafile.svc.cluster.local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile
  namespace: seafile
  labels:
    app: seafile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seafile
  strategy:
    type: Recreate    # PVC ist RWO — nur ein Pod gleichzeitig
  template:
    metadata:
      labels:
        app: seafile
    spec:
      initContainers:
        # Warten bis MariaDB bereit ist, bevor Seafile startet
        - name: wait-for-mariadb
          image: alpine:3.23@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
          command: ['sh', '-c', 'until nc -z mariadb 3306; do echo "waiting for mariadb..."; sleep 2; done']
      containers:
        - name: seafile
          image: seafileltd/seafile-mc:13.0.19@sha256:3483711551088e1e3423ec2ee933dccfdc779041b11191ea5a943e3225b15637  # TODO vor Deployment prüfen: ARM64-Support? Stabile Tags sind ggf. nur amd64. Aktuelle Tags: hub.docker.com/r/seafileltd/seafile-mc/tags
          env:
            - name: DB_HOST
              value: mariadb
            - name: DB_ROOT_PASSWD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: SEAFILE_ADMIN_EMAIL
              value: admin@example.com    # MUST CHANGED BEFORE DEPLOYMENT
            - name: SEAFILE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_ADMIN_PASSWORD
            - name: SEAFILE_SERVER_HOSTNAME
              value: seafile.example.com  # <-- deine Domain eintragen
            - name: TIME_ZONE
              value: Europe/Berlin
          ports:
            - containerPort: 80
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10    # Seafile braucht beim ersten Start länger
      volumes:
        - name: seafile-data
          persistentVolumeClaim:
            claimName: seafile-data
---
apiVersion: v1
kind: Service
metadata:
  name: seafile
  namespace: seafile
  labels:
    app: seafile
spec:
  selector:
    app: seafile
  ports:
    - port: 80
      targetPort: 80
