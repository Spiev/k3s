apiVersion: v1
kind: Namespace
metadata:
  name: seafile
  labels:
    app: seafile
    type: service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: seafile
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:8.6@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: seafile
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-data
  namespace: seafile
  labels:
    app: mariadb
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi    # Metadaten-DB: kleiner als Blob-Storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seafile-data
  namespace: seafile
  labels:
    app: seafile
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi    # Datei-Blobs: großzügig bemessen
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: seafile
  labels:
    app: mariadb
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:12.2@sha256:e0236fc6386e7eacd9359e59d0a078bd7aa0d18280d36d13061121bedeaee903
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: seafile_db
            - name: MYSQL_USER
              value: seafile
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: seafile
  labels:
    app: mariadb
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
  # ClusterIP (default): nur intern erreichbar
  # Seafile spricht MariaDB an via: mariadb.seafile.svc.cluster.local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile
  namespace: seafile
  labels:
    app: seafile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seafile
  strategy:
    type: Recreate    # PVC ist RWO — nur ein Pod gleichzeitig
  template:
    metadata:
      labels:
        app: seafile
    spec:
      initContainers:
        # Warten bis MariaDB bereit ist, bevor Seafile startet
        - name: wait-for-mariadb
          image: alpine:3.23@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
          command: ['sh', '-c', 'until nc -z mariadb 3306; do echo "waiting for mariadb..."; sleep 2; done']
        - name: wait-for-redis
          image: alpine:3.23@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
          command: ['sh', '-c', 'until nc -z redis 6379; do echo "waiting for redis..."; sleep 2; done']
        # CSRF_TRUSTED_ORIGINS wird von seafile-mc nicht als Env-Variable unterstützt
        # und muss direkt in seahub_settings.py stehen (Django-Einstellung).
        # Beim allerersten Start (leerer PVC) greift dies erst nach einem Pod-Neustart,
        # da seahub_settings.py erst vom Startup-Script erstellt wird.
        - name: patch-seahub-settings
          image: alpine:3.23@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
          command:
            - sh
            - -c
            - |
              grep -q 'CSRF_TRUSTED_ORIGINS' /shared/seafile/conf/seahub_settings.py 2>/dev/null || \
              echo "CSRF_TRUSTED_ORIGINS = ['https://${SEAFILE_HOSTNAME}']" \
              >> /shared/seafile/conf/seahub_settings.py
          env:
            - name: SEAFILE_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_SERVER_HOSTNAME
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
      containers:
        - name: seafile
          image: seafileltd/seafile-mc:13.0.20@sha256:eaa7c22f08efbeb88c3829a284d9565559153bc0bb9099464e4eda444dabae70
          env:
            - name: SEAFILE_MYSQL_DB_HOST
              value: mariadb
            - name: SEAFILE_MYSQL_DB_PORT
              value: "3306"
            - name: SEAFILE_MYSQL_DB_USER
              value: seafile
            - name: INIT_SEAFILE_MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: SEAFILE_MYSQL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MYSQL_PASSWORD
            - name: SEAFILE_MYSQL_DB_CCNET_DB_NAME
              value: ccnet_db
            - name: SEAFILE_MYSQL_DB_SEAFILE_DB_NAME
              value: seafile_db
            - name: SEAFILE_MYSQL_DB_SEAHUB_DB_NAME
              value: seahub_db
            - name: INIT_SEAFILE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_ADMIN_EMAIL
            - name: INIT_SEAFILE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_ADMIN_PASSWORD
            - name: SEAFILE_SERVER_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_SERVER_HOSTNAME
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: JWT_PRIVATE_KEY
            - name: CACHE_PROVIDER
              value: redis
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: TIME_ZONE
              value: Europe/Berlin
            - name: SEAFILE_SERVER_PROTOCOL
              value: https
          ports:
            - containerPort: 80
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10    # Seafile braucht beim ersten Start länger
      volumes:
        - name: seafile-data
          persistentVolumeClaim:
            claimName: seafile-data
---
apiVersion: v1
kind: Service
metadata:
  name: seafile
  namespace: seafile
  labels:
    app: seafile
spec:
  selector:
    app: seafile
  ports:
    - port: 80
      targetPort: 80
