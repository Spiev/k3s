apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: seafile
  labels:
    app: mariadb
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
  # ClusterIP (default): nur intern erreichbar
  # Seafile spricht MariaDB an via: mariadb.seafile.svc.cluster.local
