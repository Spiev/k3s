apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile
  namespace: seafile
  labels:
    app: seafile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seafile
  strategy:
    type: Recreate    # PVC ist RWO — nur ein Pod gleichzeitig
  template:
    metadata:
      labels:
        app: seafile
    spec:
      initContainers:
        # Warten bis MariaDB bereit ist, bevor Seafile startet
        - name: wait-for-mariadb
          image: alpine
          command: ['sh', '-c', 'until nc -z mariadb 3306; do echo "waiting for mariadb..."; sleep 2; done']
      containers:
        - name: seafile
          image: seafileltd/seafile-mc:latest
          env:
            - name: DB_HOST
              value: mariadb
            - name: DB_ROOT_PASSWD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: SEAFILE_ADMIN_EMAIL
              value: admin@example.com    # <-- anpassen
            - name: SEAFILE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_ADMIN_PASSWORD
            - name: SEAFILE_SERVER_HOSTNAME
              value: seafile.example.com  # <-- deine Domain eintragen
            - name: TIME_ZONE
              value: Europe/Berlin
          ports:
            - containerPort: 80
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10    # Seafile braucht beim ersten Start länger
      volumes:
        - name: seafile-data
          persistentVolumeClaim:
            claimName: seafile-data
