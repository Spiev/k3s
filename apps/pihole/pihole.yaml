apiVersion: v1
kind: Namespace
metadata:
  name: pihole
  labels:
    app: pihole
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pihole-config
  namespace: pihole
  labels:
    app: pihole
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-retain-encrypted
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole
  strategy:
    type: Recreate      # RWO PVC — nur ein Pod gleichzeitig
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          image: pihole/pihole:2025.02.1@sha256:528e4044f67da14f3aecedda92f939c87b7b1e69fe67d09ac2b3e7fdc1f72515
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: WEBPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pihole-secret
                  key: WEBPASSWORD
            - name: PIHOLE_DNS_
              value: "8.8.8.8;8.8.4.4;2001:4860:4860::8888;2001:4860:4860::8844"
            - name: FTLCONF_LOCAL_IPV6
              value: "::"          # FTL auf allen IPv6-Interfaces lauschen
            - name: IPv6
              value: "true"
          ports:
            - containerPort: 53
              protocol: TCP
              name: dns-tcp
            - containerPort: 53
              protocol: UDP
              name: dns-udp
            - containerPort: 80
              protocol: TCP
              name: web
          securityContext:
            capabilities:
              add:
                - NET_ADMIN   # DNS-Listener (+ optionales DHCP)
                - SYS_NICE    # CPU-Scheduling
          volumeMounts:
            - name: config
              mountPath: /etc/pihole
          readinessProbe:
            httpGet:
              path: /admin
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pihole-config
---
# DNS-Service: LoadBalancer mit Dual-Stack → Pi-hole bekommt IPv4 + IPv6 vom Node
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
  namespace: pihole
  labels:
    app: pihole
spec:
  type: LoadBalancer
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  selector:
    app: pihole
  ports:
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
---
# Web-Service: ClusterIP → Traefik Ingress (pihole-ingress.yaml)
apiVersion: v1
kind: Service
metadata:
  name: pihole-web
  namespace: pihole
  labels:
    app: pihole
spec:
  selector:
    app: pihole
  ports:
    - port: 80
      targetPort: 80
